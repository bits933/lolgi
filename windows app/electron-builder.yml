appId: com.logitech.actionsring
productName: Logi Actions Ring
copyright: Copyright © 2026
asar: true

directories:
  output: release
  buildResources: resources

# Keep staging (`dist`) and packaged output (`release`) separate. The explicit
# allowlist prevents stale installers, win-unpacked trees, or builder metadata
# from ever being copied into app.asar.
files:
  - from: .
    to: .
    filter:
      - package.json
  - from: dist
    to: dist
    filter:
      - build-info.json
      - main-bundled.js
      - preload-dashboard.js
      - preload-overlay.js
      - renderer/dashboard/**/*
      - renderer/overlay/**/*
  - from: src/assets
    to: src/assets
    filter:
      - "**/*"

extraResources:
  - from: resources/
    to: resources/
    filter:
      - app-icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: app-icon.png
  requestedExecutionLevel: asInvoker
  artifactName: "${productName} Setup ${version}.${ext}"

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
