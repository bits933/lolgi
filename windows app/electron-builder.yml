appId: com.logitech.actionsring
productName: Logi Actions Ring
copyright: Copyright © 2025

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - src/assets/**/*
  - package.json

extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/app-icon.ico
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish:
  provider: github
  releaseType: draft
