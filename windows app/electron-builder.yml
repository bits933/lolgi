appId: com.lolgi.actionsring
productName: Lolgi Action Ring
copyright: Copyright © 2026
asar: true

directories:
  output: ../release
  buildResources: resources

# Keep staging (`dist`) and root-level packaged output (`../release`) separate. The explicit
# allowlist prevents stale installers, win-unpacked trees, or builder metadata
# from ever being copied into app.asar.
files:
  - from: .
    to: .
    filter:
      - package.json
  - from: dist
    to: dist
    filter:
      - build-info.json
      - main-bundled.js
      - preload-dashboard.js
      - preload-overlay.js
      - renderer/dashboard/**/*
      - renderer/overlay/**/*
  - from: src/assets
    to: src/assets
    filter:
      - "**/*"

extraResources:
  - from: resources/
    to: resources/
    filter:
      - app-icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: app-icon.png
  requestedExecutionLevel: asInvoker
  artifactName: "${productName} Setup ${version}.${ext}"

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Native MSI is available through `npm run dist:msi`. Keep this upgrade code
# stable forever so newer MSI releases replace older ones cleanly.
msi:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  upgradeCode: "{D1E21B0F-0E70-4B65-A0B4-3A51FBAB6B6A}"
