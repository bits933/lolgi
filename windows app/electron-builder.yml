appId: com.lolgi.actionsring
productName: Lolgi Action Ring
copyright: Copyright © 2026
asar: true

directories:
  output: ../release
  buildResources: resources

# Auto-update source. `npm run dist` also emits latest.yml here; publish both the
# NSIS installer and latest.yml to the matching GitHub Release so installed apps
# detect new versions. Public repo, so no token needed to check for updates.
publish:
  provider: github
  owner: bits933
  repo: lolgi

# Keep staging (`dist`) and root-level packaged output (`../release`) separate. The explicit
# allowlist prevents stale installers, win-unpacked trees, or builder metadata
# from ever being copied into app.asar.
files:
  - from: .
    to: .
    filter:
      - package.json
  - from: dist
    to: dist
    filter:
      - build-info.json
      - main-bundled.js
      - preload-dashboard.js
      - preload-overlay.js
      - renderer/dashboard/**/*
      - renderer/overlay/**/*
  - from: src/assets
    to: src/assets
    filter:
      - "**/*"

extraResources:
  - from: resources/
    to: resources/
    filter:
      - app-icon.png
  - from: src/renderer/assets/fonts/OFL.txt
    to: licenses/Hanken-Grotesk-OFL.txt

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: app-icon.png
  requestedExecutionLevel: asInvoker
  artifactName: "${productName} Setup ${version}.${ext}"

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Native MSI is available through `npm run dist:msi`. Keep this upgrade code
# stable forever so newer MSI releases replace older ones cleanly.
msi:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  upgradeCode: "{D1E21B0F-0E70-4B65-A0B4-3A51FBAB6B6A}"
