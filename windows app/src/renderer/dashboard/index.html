<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- img-src data: is required — extracted app icons are PNG data URLs -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
    <title>Logi Actions Ring — Settings</title>
    <style>
      /* Pre-paint background — matches the dashboard canvas token (--bg-base)
         and follows the OS preference so 'system' theme has no flash. */
      html, body {
        margin: 0;
        padding: 0;
        background: #16181d;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      @media (prefers-color-scheme: light) {
        html, body { background: #f4f5f7; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
